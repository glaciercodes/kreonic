<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <link rel="icon" href="/favicon.png" type="image/png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Free COD Points</title>
    <style>
        /* Modern Reset & Colors */
        :root {
            --primary-blue: #00a8ff;
            --light-blue: #e1f5fe;
            --white: #ffffff;
            --text-dark: #2f3640;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--light-blue);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: var(--text-dark);
        }

        /* Container Card */
        .card {
            background: var(--white);
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }

        h1 {
            font-size: 2rem;
            margin-bottom: 1.5rem;
            color: var(--primary-blue);
        }

        p {
            margin-bottom: 2rem;
            line-height: 1.6;
            color: #7f8c8d;
        }

        /* The Button */
        .cta-button {
            display: inline-block;
            background-color: var(--primary-blue);
            color: var(--white);
            text-decoration: none;
            padding: 15px 30px;
            font-weight: bold;
            border-radius: 50px;
            transition: transform 0.2s, background-color 0.2s;
            box-shadow: 0 4px 15px rgba(0, 168, 255, 0.3);
        }

        .cta-button:hover {
            background-color: #0097e6;
            transform: translateY(-2px);
        }

        .cta-button:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Exclusive Reward</h1>
        <p>Claim your limited time bonus and upgrade your arsenal today.</p>
        
        <a href="https://hopeful-border.com/xzn6K1" class="cta-button">
            Get free COD points
        </a>
    </div>

</body>
</html>
